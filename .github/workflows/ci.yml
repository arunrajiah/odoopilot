name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check odoopilot/
      - name: Lint
        run: ruff check odoopilot/

  xml-check:
    name: XML well-formed check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check XML files
        run: |
          python3 - <<'EOF'
          import sys, xml.etree.ElementTree as ET, pathlib

          errors = []
          for path in pathlib.Path("odoopilot").rglob("*.xml"):
              try:
                  ET.parse(path)
              except ET.ParseError as e:
                  errors.append(f"{path}: {e}")

          if errors:
              print("XML parse errors found:")
              for err in errors:
                  print(" ", err)
              sys.exit(1)
          else:
              print(f"All XML files are well-formed ({len(list(pathlib.Path('odoopilot').rglob('*.xml')))} files checked).")
          EOF
