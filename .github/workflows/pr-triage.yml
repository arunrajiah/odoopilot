name: PR Triage

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    name: Welcome new contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Thanks for opening your first PR to OdooPilot! 🎉

            A maintainer will review your changes. While you wait, please make sure:
            - All CI checks pass (lint, XML validation)
            - The PR template checklist is filled in

            We'll get back to you soon!

  auto-label:
    name: Auto-label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
