addon:
  - changed-files:
    - any-glob-to-any-file: 'odoopilot/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

docs:
  - changed-files:
    - any-glob-to-any-file:
      - '*.md'
      - 'docs/**'

xml:
  - changed-files:
    - any-glob-to-any-file: '**/*.xml'

python:
  - changed-files:
    - any-glob-to-any-file: '**/*.py'
